<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hummus Hub | Onboarding de Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #14b8a6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(20, 184, 166, 0.1) 0%, transparent 40%);
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-section {
            margin-bottom: 2.5rem;
            display: none; /* Hidden by default for step-by-step */
        }

        .form-section.active {
            display: block;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .section-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
        }

        .section-header i {
            color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field.full {
            grid-column: span 2;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }

        button {
            padding: 0.875rem 2rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        button.primary {
            background: linear-gradient(to right, var(--primary), #7c3aed);
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .step-dot.active {
            background: var(--primary);
            width: 60px;
        }

        #loading {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-card {
            display: none;
            text-align: center;
        }

        .success-card i {
            color: var(--secondary);
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .field.full { grid-column: span 1; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>Sincronizando con Notion...</p>
    </div>

    <div class="container" id="formContainer">
        <header>
            <h1>Hummus Hub</h1>
            <p class="subtitle">Onboarding de Cliente Premium</p>
        </header>

        <div class="step-indicator">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot" id="dot2"></div>
            <div class="step-dot" id="dot3"></div>
        </div>

        <form id="onboardingForm">
            <!-- STEP 1: Basic Info -->
            <div class="form-section active" id="step1">
                <div class="section-header">
                    <i data-lucide="info"></i>
                    <h2>Información Básica</h2>
                </div>
                <div class="grid">
                    <div class="field full">
                        <label for="name">Nombre del Cliente / Marca</label>
                        <input type="text" id="name" name="name" placeholder="Ej: Hummus Agency" required>
                    </div>
                    <div class="field">
                        <label for="industry">Rubro</label>
                        <select id="industry" name="industry" required>
                            <option value="Servicios">Servicios</option>
                            <option value="E-commerce">E-commerce</option>
                            <option value="Gastronomía">Gastronomía</option>
                            <option value="Moda">Moda</option>
                            <option value="Tecnología">Tecnología</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="team">Equipo Asignado</label>
                        <select id="team" name="team" required>
                            <option value="Team Sofi & Ori">Team Sofi & Ori</option>
                            <option value="Team Cami & Yae">Team Cami & Yae</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- STEP 2: Brand Identity -->
            <div class="form-section" id="step2">
                <div class="section-header">
                    <i data-lucide="sparkles"></i>
                    <h2>Identidad de Marca</h2>
                </div>
                <div class="grid">
                    <div class="field full">
                        <label for="brand_voice">Tono de Voz</label>
                        <textarea id="brand_voice" name="brand_voice" placeholder="Ej: Cercano, profesional pero divertido..."></textarea>
                    </div>
                    <div class="field full">
                        <label for="target_audience">Público Objetivo</label>
                        <textarea id="target_audience" name="target_audience" placeholder="Ej: Mujeres de 25-40 años interesadas en..."></textarea>
                    </div>
                    <div class="field full">
                        <label for="value_prop">Propuesta de Valor</label>
                        <textarea id="value_prop" name="value_prop" placeholder="¿Qué hace única a esta marca?"></textarea>
                    </div>
                </div>
            </div>

            <!-- STEP 3: Assets & Links -->
            <div class="form-section" id="step3">
                <div class="section-header">
                    <i data-lucide="link"></i>
                    <h2>Links y Activos</h2>
                </div>
                <div class="grid">
                    <div class="field">
                        <label for="instagram">Instagram (URL o @)</label>
                        <input type="text" id="instagram" name="instagram" placeholder="@usuario">
                    </div>
                    <div class="field">
                        <label for="website">Sitio Web</label>
                        <input type="url" id="website" name="website" placeholder="https://...">
                    </div>
                    <div class="field full">
                        <label for="briefing_url">Link al Briefing (Drive/Notion)</label>
                        <input type="url" id="briefing_url" name="briefing_url" placeholder="https://...">
                    </div>
                    <div class="field full">
                        <label for="brand_manual_url">Link al Manual de Marca</label>
                        <input type="url" id="brand_manual_url" name="brand_manual_url" placeholder="https://...">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="button" class="secondary" id="prevBtn" style="display: none;">Anterior</button>
                <button type="button" class="primary" id="nextBtn">Siguiente</button>
                <button type="submit" class="primary" id="submitBtn" style="display: none;">Finalizar Onboarding</button>
            </div>
        </form>

        <!-- Success Message -->
        <div class="success-card" id="successCard">
            <i data-lucide="check-circle"></i>
            <h2>¡Cliente Cargado!</h2>
            <p class="subtitle" style="margin-bottom: 2rem;">El cliente se ha creado en Supabase y su Second Brain en Notion está listo.</p>
            <a id="notionLink" href="#" target="_blank" style="display: inline-block; padding: 1rem 2rem; background: #fff; color: #000; border-radius: 12px; font-weight: 700; text-decoration: none; transition: 0.3s;">
                Abrir en Notion
            </a>
            <div style="margin-top: 1.5rem;">
                <button onclick="location.reload()" class="secondary">Cargar otro cliente</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentStep = 1;
        const totalSteps = 3;

        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('onboardingForm');
        const loading = document.getElementById('loading');
        const formContainer = document.getElementById('formContainer');
        const successCard = document.getElementById('successCard');

        nextBtn.addEventListener('click', () => {
            if (currentStep < totalSteps) {
                document.getElementById(`step${currentStep}`).classList.remove('active');
                document.getElementById(`dot${currentStep}`).classList.remove('active');
                currentStep++;
                document.getElementById(`step${currentStep}`).classList.add('active');
                document.getElementById(`dot${currentStep}`).classList.add('active');
                updateButtons();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 1) {
                document.getElementById(`step${currentStep}`).classList.remove('active');
                document.getElementById(`dot${currentStep}`).classList.remove('active');
                currentStep--;
                document.getElementById(`step${currentStep}`).classList.add('active');
                document.getElementById(`dot${currentStep}`).classList.add('active');
                updateButtons();
            }
        });

        function updateButtons() {
            prevBtn.style.display = currentStep === 1 ? 'none' : 'block';
            if (currentStep === totalSteps) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            loading.style.display = 'flex';

            try {
                const response = await fetch('/onboarding/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    form.style.display = 'none';
                    document.querySelector('header').style.display = 'none';
                    document.querySelector('.step-indicator').style.display = 'none';
                    successCard.style.display = 'block';
                    document.getElementById('notionLink').href = result.notion_url;
                } else {
                    alert('Error: ' + result.detail);
                }
            } catch (error) {
                alert('Error de conexión: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
